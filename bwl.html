<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lichtbringer – Blackwing Lair Prio 0 Plus</title>
  <style>
    :root {
      --bg: #151515;
      --panel: #242424;
      --panel-soft: #303030;
      --text: #f2f2f2;
      --muted: #c8c8c8;
      --border: #454545;
      --accent: #d63b3b;
      --gold: #c89f6a;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    header {
      height: 72px;
      display: grid;
      grid-template-columns: 80px 1fr 80px;
      align-items: center;
      border-bottom: 1px solid var(--border);
      background: #111;
      padding: 0 18px;
    }

    header h1 {
      margin: 0;
      text-align: center;
      font-size: 26px;
    }

    .back {
      color: var(--text);
      text-decoration: none;
      font-size: 34px;
      line-height: 1;
    }

    main {
      max-width: 1500px;
      margin: 0 auto;
      padding: 28px 18px;
      display: grid;
      grid-template-columns: 300px 1fr 1.25fr;
      gap: 28px;
      min-height: calc(100vh - 72px);
    }

    .classes,
    .items,
    .details {
      align-self: start;
    }

    .classes {
      display: grid;
      gap: 10px;
      margin-top: 250px;
    }

    .class-btn,
    .item-btn {
      border: none;
      border-radius: 8px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 2px 4px rgba(0,0,0,.35);
    }

    .class-btn {
      padding: 13px 16px;
      color: #111;
      font-size: 16px;
    }

    .warrior { background: #c79c6e; }
    .hunter { background: #abd473; }
    .priest { background: #ffffff; }
    .warlock { background: #9482c9; }
    .paladin { background: #f58cba; }
    .rogue { background: #fff569; }
    .mage { background: #69ccf0; }
    .druid { background: #ff7d0a; }

    .items {
      display: grid;
      grid-template-columns: repeat(2, minmax(220px, 1fr));
      gap: 10px 28px;
      margin-top: 250px;
    }

    .item-btn {
      position: relative;
      padding: 13px 18px 13px 24px;
      background: #333;
      color: var(--text);
      font-size: 15px;
      text-align: center;
      border-left: 5px solid var(--accent);
    }

    .item-btn:hover,
    .item-btn.active {
      background: #444;
      outline: 2px solid rgba(214,59,59,.4);
    }

    .details {
      background: var(--panel);
      border-radius: 8px;
      padding: 18px;
      min-height: 720px;
      margin-top: 20px;
    }

    .details h2 {
      margin: 0 0 14px;
      font-size: 26px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 15px;
    }

    th {
      background: #454545;
      text-align: left;
      padding: 11px 10px;
    }

    td {
      padding: 10px;
      border-bottom: 1px solid var(--border);
      color: var(--muted);
      font-weight: 600;
    }

    .empty {
      color: var(--muted);
      padding: 18px 0;
    }

    @media (max-width: 1050px) {
      main {
        grid-template-columns: 1fr;
      }

      .classes,
      .items,
      .details {
        margin-top: 0;
      }

      .items {
        grid-template-columns: 1fr;
      }

      .details {
        min-height: auto;
      }
    }
  </style>
</head>
<body>
  <header>
    <a class="back" href="index.html">←</a>
    <h1>Prio 0 Blackwing Lair</h1>
    <div></div>
  </header>

  <main>
    <section class="classes" aria-label="Klassen">
      <button class="class-btn warrior">Krieger</button>
      <button class="class-btn hunter">Jäger</button>
      <button class="class-btn priest">Priester</button>
      <button class="class-btn warlock">Hexenmeister</button>
      <button class="class-btn paladin">Paladin</button>
      <button class="class-btn rogue">Schurke</button>
      <button class="class-btn mage">Magier</button>
      <button class="class-btn druid">Druide</button>
    </section>

    <section class="items" aria-label="BWL Items">
      <button class="item-btn active" onclick="showItem('Drachenfangzahn')">Drachenfangzahn</button>
      <button class="item-btn" onclick="showItem('Mantel der Pechschwingenkabale')">Mantel der Pechschwingenkabale</button>
      <button class="item-btn" onclick="showItem('Chromatische Stiefel')">Chromatische Stiefel</button>
      <button class="item-btn" onclick="showItem('Runenverzierte Klinge des schwarzen Drachenschwarms')">Runenverzierte Klinge des schwarzen Drachenschwarms</button>
      <button class="item-btn" onclick="showItem('Edelstein des Gedankensprungs')">Edelstein des Gedankensprungs</button>
      <button class="item-btn" onclick="showItem('Stiefel des reinen Gedankens')">Stiefel des reinen Gedankens</button>
      <button class="item-btn" onclick="showItem('Neltharions Träne')">Neltharions Träne</button>
      <button class="item-btn" onclick="showItem('Prestors Halskette')">Prestors Halskette</button>
      <button class="item-btn" onclick="showItem('Edelstein der Verjüngung')">Edelstein der Verjüngung</button>
      <button class="item-btn" onclick="showItem('Ebenholzfarbene Flammenhandschuhe')">Ebenholzfarbene Flammenhandschuhe</button>
    </section>

    <section class="details" aria-label="P0 Details">
      <h2 id="itemTitle">Drachenfangzahn</h2>
      <div id="itemContent"></div>
    </section>
  </main>

  <script>
    const p0Data = {
      "Drachenfangzahn": [],
      "Mantel der Pechschwingenkabale": [
        { spieler: "Malamaus", klasse: "Magier", anzahl: 1 }
      ],
      "Chromatische Stiefel": [],
      "Runenverzierte Klinge des schwarzen Drachenschwarms": [],
      "Edelstein des Gedankensprungs": [],
      "Stiefel des reinen Gedankens": [],
      "Neltharions Träne": [
        { spieler: "Jamera", klasse: "Magier", anzahl: 1 },
        { spieler: "Sindrael", klasse: "Hexenmeister", anzahl: 1 }
      ],
      "Prestors Halskette": [],
      "Edelstein der Verjüngung": [],
      "Ebenholzfarbene Flammenhandschuhe": []
    };

    function showItem(itemName) {
      document.getElementById("itemTitle").textContent = itemName;

      document.querySelectorAll(".item-btn").forEach(btn => {
        btn.classList.toggle("active", btn.textContent.trim() === itemName);
      });

      const entries = p0Data[itemName] || [];
      const content = document.getElementById("itemContent");

      if (entries.length === 0) {
        content.innerHTML = '<div class="empty">Für dieses Item ist aktuell noch kein Spieler mit P0 eingetragen.</div>';
        return;
      }

      content.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>Spieler</th>
              <th>Klasse</th>
              <th>Anzahl</th>
            </tr>
          </thead>
          <tbody>
            ${entries.map(entry => `
              <tr>
                <td>${entry.spieler}</td>
                <td>${entry.klasse}</td>
                <td>${entry.anzahl}</td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      `;
    }

    showItem("Drachenfangzahn");
  </script>
</body>
</html>
