<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lichtbringer – Prio 0 Blackwing Lair</title>
  <style>
    :root {
      --bg: #101828;
      --top: #0b1220;
      --panel: #1e293b;
      --button: #24324a;
      --button-hover: #334763;
      --line: rgba(255,255,255,.14);
      --text: #f4f4f4;
      --muted: #cfcfcf;
      --red: #facc15;
      --blue: #60a5fa;
      --glow: rgba(250,204,21,.28);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(250,204,21,.16), transparent 32%),
        radial-gradient(circle at bottom right, rgba(96,165,250,.16), transparent 30%),
        var(--bg);
      color: var(--text);
    }

    header {
      height: 72px;
      display: grid;
      grid-template-columns: 80px 1fr 80px;
      align-items: center;
      padding: 0 18px;
      background: linear-gradient(90deg, #0b1220, #172554, #0b1220);
      border-bottom: 1px solid var(--line);
    }

    header h1 {
      margin: 0;
      text-align: center;
      font-size: 26px;
      font-weight: 800;
    }

    .back {
      color: var(--text);
      text-decoration: none;
      font-size: 36px;
      line-height: 1;
    }

    main {
      max-width: 1600px;
      margin: 0 auto;
      padding: 28px 16px;
      display: grid;
      grid-template-columns: 235px 1fr 1fr;
      gap: 28px;
      min-height: calc(100vh - 72px);
    }

    .classes {
      display: grid;
      gap: 10px;
      align-self: start;
      margin-top: 245px;
    }

    .class-btn,
    .item-btn {
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 800;
      box-shadow: 0 8px 18px rgba(0,0,0,.28);
    }

    .class-btn {
      padding: 13px 12px;
      color: #111;
      font-size: 16px;
    }

    .class-btn.active {
      outline: 3px solid #fff;
      transform: translateX(4px);
    }

    .warrior { background: #c79c6e; }
    .hunter { background: #abd473; }
    .priest { background: #ffffff; }
    .warlock { background: #9482c9; }
    .paladin { background: #f58cba; }
    .rogue { background: #fff569; }
    .mage { background: #69ccf0; }
    .druid { background: #ff7d0a; }

    .items {
      align-self: start;
      margin-top: 245px;
      display: grid;
      grid-template-columns: repeat(2, minmax(245px, 1fr));
      gap: 10px 28px;
    }

    .item-btn {
      min-height: 50px;
      padding: 10px 18px;
      background: var(--button);
      color: var(--text);
      font-size: 17px;
      border-left: 6px solid var(--red);
      border-right: 1px solid rgba(250,204,21,.18);
      text-align: center;
    }

    .item-btn:hover,
    .item-btn.active {
      background: var(--button-hover);
      outline: 2px solid var(--glow);
    }

    .details {
      align-self: start;
      margin-top: 20px;
      min-height: 720px;
      background: var(--panel);
      border-radius: 8px;
      padding: 18px;
    }

    .details h2 {
      margin: 0 0 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--line);
      font-size: 27px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 16px;
    }

    th {
      padding: 11px 10px;
      background: linear-gradient(90deg, rgba(250,204,21,.22), rgba(96,165,250,.14));
      text-align: left;
      font-weight: 800;
    }

    td {
      padding: 10px;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      font-weight: 700;
    }

    .empty {
      color: var(--muted);
      padding: 16px 0;
      font-weight: 700;
    }

    .hint {
      margin-top: 16px;
      color: #aaa;
      font-size: 13px;
      line-height: 1.4;
    }

    @media (max-width: 1100px) {
      main {
        grid-template-columns: 1fr;
      }

      .classes,
      .items,
      .details {
        margin-top: 0;
      }

      .items {
        grid-template-columns: 1fr;
      }

      .details {
        min-height: auto;
      }
    }
  </style>
</head>
<body>
  <header>
    <a class="back" href="index.html">←</a>
    <h1>✨ Lichtbringer · Prio 0 Blackwing Lair</h1>
    <div></div>
  </header>

  <main>
    <section class="classes" id="classButtons" aria-label="Klassen"></section>
    <section class="items" id="itemButtons" aria-label="Items"></section>

    <section class="details" aria-label="P0-Liste">
      <h2 id="itemTitle">Item auswählen</h2>
      <div id="itemContent"></div>
      <div class="hint">Hinweis: Spieler und Anzahl können unten im JavaScript-Bereich bei <strong>p0Data</strong> gepflegt werden.</div>
    </section>
  </main>

  <script>
    const classes = [
      { key: "Krieger", css: "warrior" },
      { key: "Jäger", css: "hunter" },
      { key: "Priester", css: "priest" },
      { key: "Hexenmeister", css: "warlock" },
      { key: "Paladin", css: "paladin" },
      { key: "Schurke", css: "rogue" },
      { key: "Magier", css: "mage" },
      { key: "Druide", css: "druid" }
    ];

    const itemsByClass = {
      "Krieger": [
        "Drachenfangzahn",
        "Chromatische Stiefel",
        "Runenverzierte Klinge des schwarzen Drachenschwarms",
        "Elementiumverstärktes Bollwerk",
        "Ashkandi, Großschwert der Bruderschaft",
        "Klaue des schwarzen Drachen",
        "Doom's Edge",
        "Spineshatter",
        "Cloak of Draconic Might",
        "Prestor's Talisman of Connivery"
      ],
      "Jäger": [
        "Drachenfangzahn",
        "Ashjre'thul, Armbrust der Pein",
        "Cloak of Draconic Might",
        "Prestor's Talisman of Connivery",
        "Chromatische Stiefel",
        "Doom's Edge",
        "Drake Talon Cleaver",
        "Band of Forced Concentration"
      ],
      "Priester": [
        "Stiefel des reinen Gedankens",
        "Edelstein der Verjüngung",
        "Lok'amir il Romathis",
        "Mish'undare, Reif des Gedankenschinders",
        "Mantel der Pechschwingenkabale",
        "Ebenholzfarbene Flammenhandschuhe",
        "Neltharions Träne",
        "Band of Forced Concentration"
      ],
      "Hexenmeister": [
        "Neltharions Träne",
        "Edelstein des Gedankensprungs",
        "Mantel der Pechschwingenkabale",
        "Ebenholzfarbene Flammenhandschuhe",
        "Mish'undare, Reif des Gedankenschinders",
        "Stiefel des reinen Gedankens",
        "Band of Forced Concentration",
        "Shadow Wing Focus Staff"
      ],
      "Paladin": [
        "Stiefel des reinen Gedankens",
        "Edelstein der Verjüngung",
        "Lok'amir il Romathis",
        "Reines Elementiumband",
        "Chromatische Stiefel",
        "Elementiumverstärktes Bollwerk",
        "Mish'undare, Reif des Gedankenschinders",
        "Cloak of Draconic Might"
      ],
      "Schurke": [
        "Drachenfangzahn",
        "Runenverzierte Klinge des schwarzen Drachenschwarms",
        "Chromatische Stiefel",
        "Prestor's Talisman of Connivery",
        "Cloak of Draconic Might",
        "Doom's Edge",
        "Klaue des schwarzen Drachen",
        "Chromatically Tempered Sword"
      ],
      "Magier": [
        "Neltharions Träne",
        "Edelstein des Gedankensprungs",
        "Mantel der Pechschwingenkabale",
        "Ebenholzfarbene Flammenhandschuhe",
        "Mish'undare, Reif des Gedankenschinders",
        "Stiefel des reinen Gedankens",
        "Band of Forced Concentration",
        "Shadow Wing Focus Staff"
      ],
      "Druide": [
        "Edelstein der Verjüngung",
        "Stiefel des reinen Gedankens",
        "Lok'amir il Romathis",
        "Reines Elementiumband",
        "Mish'undare, Reif des Gedankenschinders",
        "Cloak of Draconic Might",
        "Chromatische Stiefel",
        "Ebenholzfarbene Flammenhandschuhe"
      ]
    };

    const p0Data = {
      "Mantel der Pechschwingenkabale": [
        { spieler: "Malamaus", klasse: "Magier", anzahl: 1 }
      ],
      "Neltharions Träne": [
        { spieler: "Jamera", klasse: "Magier", anzahl: 1 },
        { spieler: "Sindrael", klasse: "Hexenmeister", anzahl: 1 }
      ]
    };

    let selectedClass = "Krieger";
    let selectedItem = itemsByClass[selectedClass][0];

    function renderClasses() {
      const wrapper = document.getElementById("classButtons");
      wrapper.innerHTML = classes.map(cls => `
        <button class="class-btn ${cls.css} ${cls.key === selectedClass ? "active" : ""}" onclick="selectClass('${cls.key}')">
          ${cls.key}
        </button>
      `).join("");
    }

    function renderItems() {
      const wrapper = document.getElementById("itemButtons");
      const items = itemsByClass[selectedClass] || [];

      wrapper.innerHTML = items.map(item => `
        <button class="item-btn ${item === selectedItem ? "active" : ""}" onclick="selectItem('${escapeApostrophe(item)}')">
          ${item}
        </button>
      `).join("");
    }

    function renderDetails() {
      document.getElementById("itemTitle").textContent = selectedItem;
      const entries = p0Data[selectedItem] || [];
      const content = document.getElementById("itemContent");

      if (entries.length === 0) {
        content.innerHTML = '<div class="empty">Für dieses Item ist aktuell noch kein Spieler mit P0 eingetragen.</div>';
        return;
      }

      content.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>Spieler</th>
              <th>Klasse</th>
              <th>Anzahl</th>
            </tr>
          </thead>
          <tbody>
            ${entries.map(entry => `
              <tr>
                <td>${entry.spieler}</td>
                <td>${entry.klasse}</td>
                <td>${entry.anzahl}</td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      `;
    }

    function selectClass(className) {
      selectedClass = className;
      selectedItem = itemsByClass[className][0];
      renderAll();
    }

    function selectItem(itemName) {
      selectedItem = itemName;
      renderAll();
    }

    function escapeApostrophe(text) {
      return text.replace(/'/g, "\'");
    }

    function renderAll() {
      renderClasses();
      renderItems();
      renderDetails();
    }

    renderAll();
  </script>
</body>
</html>
