<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lichtbringer – Prio 0 Blackwing Lair</title>

  <style>
    :root{
      --gold:#facc15;
      --blue:#60a5fa;
      --bg:#08111f;
      --panel:rgba(12,18,32,.82);
      --panel-strong:rgba(15,23,42,.92);
      --text:#f8fafc;
      --muted:#cbd5e1;
      --line:rgba(255,255,255,.11);
      --shadow:0 22px 55px rgba(0,0,0,.48);
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      min-height:100vh;
      font-family:Arial, Helvetica, sans-serif;
      color:var(--text);

      background:
        linear-gradient(rgba(8,17,31,.78), rgba(8,17,31,.92)),
        url('./images/back.jpeg');

      background-size:cover;
      background-position:center;
      background-repeat:no-repeat;
      background-attachment:fixed;
    }

    .page{
      min-height:100vh;
      backdrop-filter:blur(3px);
      padding:28px 24px 70px;
    }

    .topbar{
      width:min(1500px,100%);
      margin:0 auto 28px;

      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
    }

    .back{
      display:inline-flex;
      align-items:center;
      justify-content:center;

      gap:8px;

      min-height:46px;
      padding:0 18px;

      border-radius:999px;

      color:var(--gold);
      text-decoration:none;
      font-weight:900;

      background:rgba(12,18,32,.78);

      border:1px solid rgba(250,204,21,.25);

      box-shadow:0 10px 28px rgba(0,0,0,.35);

      transition:.18s ease;
    }

    .back:hover{
      transform:translateY(-2px);

      border-color:rgba(250,204,21,.55);

      background:rgba(250,204,21,.10);
    }

    .status-pill{
      padding:12px 16px;

      border-radius:999px;

      color:#dbeafe;

      font-size:13px;
      font-weight:800;
      letter-spacing:.08em;
      text-transform:uppercase;

      background:rgba(12,18,32,.78);

      border:1px solid rgba(96,165,250,.22);

      box-shadow:0 10px 28px rgba(0,0,0,.28);
    }

    .hero{
      width:min(1500px,100%);
      margin:0 auto 34px;

      position:relative;
      overflow:visible;

      min-height:330px;

      border-radius:34px;

      border:1px solid rgba(250,204,21,.22);

      background:
        linear-gradient(120deg, rgba(8,17,31,.88), rgba(30,64,175,.42)),
        url('./images/bwl.jpg');

      background-size:cover;
      background-position:center;

      box-shadow:var(--shadow);

      display:flex;
      align-items:flex-end;
    }

    .hero::after{
      content:'';

      position:absolute;
      inset:0;

      border-radius:34px;

      background:
        radial-gradient(circle at 15% 20%, rgba(250,204,21,.22), transparent 30%),
        linear-gradient(to top, rgba(8,17,31,.98), rgba(8,17,31,.15));

      pointer-events:none;
    }

    .hero-content{
      position:relative;
      z-index:2;

      padding:38px;

      width:100%;

      display:flex;
      align-items:flex-end;
      gap:24px;
    }

    .hero-icon{
      width:150px;
      height:150px;

      flex:0 0 auto;

      border-radius:50%;
      object-fit:cover;

      border:4px solid var(--gold);

      background:#111827;

      box-shadow:
        0 0 35px rgba(250,204,21,.38),
        0 18px 45px rgba(0,0,0,.55);
    }

    .hero-text h1{
      font-size:clamp(36px,5vw,70px);

      line-height:1;

      font-weight:950;

      letter-spacing:.4px;

      text-shadow:0 0 24px rgba(250,204,21,.28);
    }

    .hero-tags{
      margin-top:18px;

      display:flex;
      flex-wrap:wrap;
      gap:10px;
    }

    .tag{
      padding:8px 12px;

      border-radius:999px;

      color:#f8fafc;

      font-size:12px;
      font-weight:900;
      letter-spacing:.08em;
      text-transform:uppercase;

      background:rgba(250,204,21,.13);

      border:1px solid rgba(250,204,21,.22);
    }

    .hero-search{
      position:relative;

      margin-top:20px;

      width:min(680px,100%);
    }

    #globalSearch{
      width:100%;

      padding:15px 18px;

      border-radius:18px;

      border:1px solid rgba(250,204,21,.34);

      background:rgba(8,17,31,.88);

      color:var(--text);

      font-size:16px;
      font-weight:850;

      box-shadow:0 12px 28px rgba(0,0,0,.34);
    }

    .search-results{
      display:none;
      position:absolute;
      left:0;
      right:0;
      top:calc(100% + 10px);
      z-index:30;
      max-height:360px;
      overflow:auto;
      padding:10px;
      border-radius:18px;
      background:rgba(12,18,32,.98);
      border:1px solid rgba(255,255,255,.13);
      box-shadow:0 22px 45px rgba(0,0,0,.58);
    }

    .search-result-btn{
      width:100%;
      display:block;
      margin:6px 0;
      padding:12px 14px;
      border:0;
      border-radius:14px;
      cursor:pointer;
      text-align:left;
      color:var(--text);
      background:rgba(255,255,255,.06);
      font-weight:950;
    }

    .search-small{
      display:block;
      margin-top:4px;
      color:#cbd5e1;
      font-size:12px;
      font-weight:750;
    }

    .layout{
      width:min(1500px,100%);
      margin:auto;

      display:grid;
      grid-template-columns:260px minmax(360px,1fr) minmax(400px,1.1fr);

      gap:24px;
      align-items:start;
    }

    .panel{
      background:var(--panel);

      border:1px solid var(--line);

      border-radius:28px;

      box-shadow:var(--shadow);

      backdrop-filter:blur(14px);
    }

    .panel-head{
      padding:20px 20px 0;
    }

    .panel-title{
      color:var(--gold);

      font-size:14px;

      letter-spacing:.15em;
      text-transform:uppercase;
      font-weight:950;
    }

    .slots{
      padding:18px;

      display:grid;
      gap:10px;
    }

    .slot-btn{
      width:100%;

      padding:14px 15px;

      border:0;
      cursor:pointer;

      border-radius:16px;

      color:var(--text);

      text-align:left;

      font-size:15px;
      font-weight:900;

      background:
        linear-gradient(
          135deg,
          rgba(37,56,91,.98),
          rgba(16,25,45,.98)
        );

      border-left:5px solid rgba(250,204,21,.58);

      box-shadow:0 8px 22px rgba(0,0,0,.26);

      transition:.16s ease;
    }

    .slot-btn:hover,
    .slot-btn.active{
      transform:translateX(5px);

      background:
        linear-gradient(
          135deg,
          rgba(250,204,21,.38),
          rgba(120,80,10,.88)
        );

      border-left:5px solid #facc15;

      color:#fff7cc;

      box-shadow:
        0 0 0 3px rgba(250,204,21,.25),
        0 0 22px rgba(250,204,21,.35),
        0 12px 28px rgba(0,0,0,.32);
    }

    .items-panel{
      padding:20px;
    }

    .items-title-row{
      display:flex;
      align-items:center;
      justify-content:space-between;

      gap:14px;

      margin-bottom:18px;
    }

    .item-count{
      color:#dbeafe;

      font-size:12px;
      font-weight:900;

      text-transform:uppercase;
      letter-spacing:.10em;

      padding:8px 10px;

      border-radius:999px;

      background:rgba(96,165,250,.12);

      border:1px solid rgba(96,165,250,.18);

      white-space:nowrap;
    }

    .items{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
      gap:14px;
    }

    .item-card{
      min-height:92px;

      padding:18px;

      border:0;
      cursor:pointer;

      border-radius:22px;

      color:var(--text);

      text-align:left;

      background:
        radial-gradient(
          circle at top left,
          rgba(250,204,21,.13),
          transparent 35%
        ),
        linear-gradient(
          180deg,
          rgba(37,56,91,.98),
          rgba(16,25,45,.98)
        );

      border:1px solid rgba(255,255,255,.11);

      box-shadow:0 12px 28px rgba(0,0,0,.28);

      transition:.18s ease;

      position:relative;
      overflow:hidden;
    }

    .item-card::before{
      content:'✦';

      color:var(--gold);

      font-size:18px;

      position:absolute;

      right:16px;
      top:14px;

      opacity:.9;
    }

    .item-card:hover,
    .item-card.active{
      transform:translateY(-4px);

      background:
        radial-gradient(
          circle at top left,
          rgba(255,220,120,.35),
          transparent 35%
        ),
        linear-gradient(
          180deg,
          rgba(180,120,20,.95),
          rgba(90,55,5,.96)
        );

      border-color:rgba(250,204,21,.85);

      color:#fff7cc;

      box-shadow:
        0 0 0 2px rgba(250,204,21,.30),
        0 0 28px rgba(250,204,21,.28),
        0 18px 38px rgba(0,0,0,.42);
    }

    .item-name{
      display:block;

      padding-right:24px;

      font-size:17px;
      font-weight:950;
      line-height:1.28;
    }
  </style>
</head>

<body>

  <div class="page">

    <div class="topbar">

      <a class="back" href="index.html">
        ← Zur Startseite
      </a>

      <div class="status-pill">
        Blackwing Lair · Prio 0 Plus
      </div>

    </div>

    <section class="hero">

      <div class="hero-content">

        <img
          class="hero-icon"
          src="./images/bwl.jpg"
          alt="BWL Icon"
        />

        <div class="hero-text">

          <h1>Blackwing Lair</h1>

          <div class="hero-tags">
            <span class="tag">BWL</span>
            <span class="tag">Sheet Sync</span>
            <span class="tag">Prio 0 Plus</span>
          </div>

          <div class="hero-search">

            <input
              id="globalSearch"
              type="text"
              placeholder="Item oder Spieler suchen ..."
              autocomplete="off"
            />

            <div id="searchResults" class="search-results"></div>

          </div>

        </div>

      </div>

    </section>

    <main class="layout">

      <section class="panel slots" id="slotButtons"></section>

      <section class="panel items-panel">

        <div class="items-title-row">
          <h2 class="panel-title" id="itemsTitle">Items</h2>
          <div class="item-count" id="itemCount">0 Items</div>
        </div>

        <div class="items" id="itemButtons"></div>

      </section>

      <section class="panel details">

        <div class="details-header">
          <h2 id="itemTitle">Item auswählen</h2>
        </div>

        <div id="itemContent"></div>

      </section>

    </main>

  </div>
</body>
</html>
