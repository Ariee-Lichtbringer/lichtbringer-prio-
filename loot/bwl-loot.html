<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lichtbringer – BWL Prio-Auswahl</title>

  <style>

    :root{
      --gold:#facc15;
      --blue:#60a5fa;
      --bg:#08111f;
      --panel:rgba(12,18,32,.88);
      --text:#f8fafc;
      --muted:#cbd5e1;
      --line:rgba(255,255,255,.12);
      --danger:#ef4444;
      --green:#22c55e;
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
    }

    body{
      min-height:100vh;
      font-family:Arial, Helvetica, sans-serif;
      color:var(--text);

      background:
        linear-gradient(rgba(8,17,31,.80), rgba(8,17,31,.94)),
        url('../images/bwl.jpg');

      background-size:cover;
      background-position:center;
      background-attachment:fixed;
    }

    .overlay{
      min-height:100vh;
      padding:36px 22px 60px;
      backdrop-filter:blur(3px);
    }

    .topbar{
      width:min(1400px,100%);
      margin:0 auto 28px;

      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:16px;
      flex-wrap:wrap;
    }

    .back{
      color:var(--text);
      text-decoration:none;
      font-weight:800;
      border:1px solid var(--line);
      padding:12px 16px;
      border-radius:14px;
      background:rgba(12,18,32,.72);
    }

    .back:hover{
      border-color:rgba(250,204,21,.45);
    }

    .header{
      width:min(1400px,100%);
      margin:0 auto 28px;
      padding:30px;
      border-radius:24px;
      background:var(--panel);
      border:1px solid rgba(250,204,21,.22);
      box-shadow:0 20px 45px rgba(0,0,0,.45);
    }

    h1{
      color:var(--gold);
      font-size:clamp(34px,5vw,58px);
      margin-bottom:8px;
    }

    .subtitle{
      color:#dbeafe;
      line-height:1.7;
      font-size:15px;
    }

    .grid{
      width:min(1400px,100%);
      margin:auto;
      display:grid;
      grid-template-columns:420px 1fr;
      gap:22px;
    }

    .card{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:22px;
      padding:24px;
      box-shadow:0 18px 40px rgba(0,0,0,.38);
    }

    h2{
      color:var(--gold);
      margin-bottom:16px;
      font-size:24px;
    }

    label{
      display:block;
      color:var(--muted);
      font-size:13px;
      font-weight:800;
      margin:14px 0 7px;
      text-transform:uppercase;
      letter-spacing:.08em;
    }

    input,
    select{
      width:100%;
      padding:13px 14px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.16);
      background:rgba(2,6,23,.82);
      color:var(--text);
      font-size:15px;
    }

    .btn{
      width:100%;
      margin-top:16px;
      padding:14px 18px;
      border-radius:14px;
      border:1px solid rgba(250,204,21,.25);
      background:linear-gradient(135deg,rgba(250,204,21,.28),rgba(96,165,250,.18));
      color:var(--text);
      font-weight:900;
      cursor:pointer;
      transition:.18s;
    }

    .btn:hover{
      transform:translateY(-2px);
      border-color:rgba(250,204,21,.55);
    }

    .status{
      margin-top:16px;
      padding:14px;
      border-radius:14px;
      border:1px solid var(--line);
      background:rgba(2,6,23,.55);
      color:#dbeafe;
      line-height:1.6;
      font-size:14px;
    }

    .ok{
      color:var(--green);
      font-weight:900;
    }

    .bad{
      color:var(--danger);
      font-weight:900;
    }

    .bwl-hero{
      .bwl-hero{
      width:100%;
      height:140px;
      object-fit:cover;
      object-position:center;
      border-radius:18px;
      margin-bottom:20px;
      border:1px solid rgba(250,204,21,.28);
      box-shadow:
        0 0 30px rgba(0,0,0,.45),
        0 0 18px rgba(250,204,21,.12);
    }

    .loot-list{
      display:flex;
      flex-direction:column;
      gap:8px;
      max-height:620px;
      overflow:auto;
      padding-right:4px;
    }

    .loot-item{
      padding:10px 14px;
      border-radius:12px;
      background:rgba(2,6,23,.72);
      border:1px solid rgba(255,255,255,.10);
      cursor:pointer;
      transition:.18s;
      font-weight:700;
      font-size:15px;
    }

    .loot-item:hover{
      transform:translateX(4px);
      border-color:rgba(250,204,21,.45);
      background:rgba(15,23,42,.92);
    }

    .epic{
      color:#c084fc;
    }

    .rare{
      color:#60a5fa;
    }

    .uncommon{
      color:#4ade80;
    }

    .legendary{
      color:#fb923c;
    }

    .tooltip{
      position:fixed;
      z-index:9999;
      width:390px;
      padding:16px;
      border-radius:8px;
      background:
        linear-gradient(rgba(7,12,31,.96), rgba(2,6,23,.98));
      border:1px solid rgba(148,163,184,.75);
      box-shadow:
        0 0 0 1px rgba(255,255,255,.10),
        0 0 28px rgba(0,0,0,.85);
      pointer-events:none;
      font-family:Arial, Helvetica, sans-serif;
      font-size:16px;
      line-height:1.35;
    }

    .tooltip-title{
      font-size:24px;
      font-weight:900;
      margin-bottom:4px;
    }

    .tooltip-title.epic{color:#a335ee;}
    .tooltip-title.rare{color:#0070dd;}
    .tooltip-title.uncommon{color:#1eff00;}
    .tooltip-title.legendary{color:#ff8000;}

    .tooltip-ilvl{
      color:#ffd100;
      font-size:18px;
      font-weight:900;
      margin-bottom:8px;
    }

    .tooltip-bind{
      color:#ffffff;
      font-size:18px;
      font-weight:800;
    }

    .tooltip-row{
      display:flex;
      justify-content:space-between;
      gap:18px;
      color:#ffffff;
      font-size:18px;
      font-weight:800;
      margin-top:2px;
    }

    .tooltip-stat{
      color:#ffffff;
      font-size:18px;
      font-weight:800;
      margin-top:4px;
    }

    .tooltip-equip{
      color:#1eff00;
      font-size:17px;
      font-weight:900;
      margin-top:8px;
    }

    .tooltip-p0{
      margin-top:12px;
      padding-top:10px;
      border-top:1px solid rgba(255,255,255,.18);
      color:#dbeafe;
    }

    .tooltip-p0 strong{
      color:#facc15;
      font-size:17px;
    }

    .tooltip ul{
      margin-top:6px;
      padding-left:20px;
      line-height:1.55;
      font-size:15px;
    }

    .hidden{
      display:none;
    }

    @media(max-width:1000px){
      .grid{
        grid-template-columns:1fr;
      }

      .bwl-hero{
        height:230px;
      }
    }

  </style>
</head>

<body>

<div class="overlay">

  <div class="topbar">

    <a class="back" href="../index.html">
      ← Zurück zur Startseite
    </a>

    <a class="back" href="../bwl.html">
      P0+ Übersicht öffnen
    </a>

  </div>

  <div class="header">

    <h1>Blackwing Lair – Prio-Auswahl</h1>

    <div class="subtitle">
      Spieler können ihre P1-, P2- und P3-Prioritäten eintragen.
      Beim Hover über ein Item werden Werte und gesetzte P0+ angezeigt.
    </div>

  </div>

  <div class="grid">

    <div class="card">

      <h2>Spieler-Eingabe</h2>

      <label>Raid-PIN</label>
      <input id="raidPin" type="password" placeholder="Raid-PIN eingeben">

      <label>Charaktername</label>
      <input id="playerName" type="text" placeholder="z. B. Milkshake">

      <label>Klasse</label>

      <select id="playerClass">
        <option value="">Klasse auswählen</option>
        <option>Krieger</option>
        <option>Paladin</option>
        <option>Jäger</option>
        <option>Schurke</option>
        <option>Priester</option>
        <option>Schamane</option>
        <option>Magier</option>
        <option>Hexenmeister</option>
        <option>Druide</option>
      </select>

      <label>P1</label>
      <select id="p1"></select>

      <label>P2</label>
      <select id="p2"></select>

      <label>P3</label>
      <select id="p3"></select>

      <button class="btn" onclick="savePrio()">
        Prios speichern
      </button>

      <div id="playerStatus" class="status">
        Status: Bitte Raid-PIN eingeben und Prios auswählen.
      </div>

    </div>

    <div class="card">

      <img class="bwl-hero" src="../images/bwl.jpg" alt="Blackwing Lair">

      <h2>Möglicher Loot</h2>

      <div id="lootList" class="loot-list"></div>

    </div>

  </div>

</div>

<div id="tooltip" class="tooltip hidden"></div>

function fillItems(){
  ["p1","p2","p3"].forEach(id => {
    const select = document.getElementById(id);
    select.innerHTML = `<option value="">Item auswählen</option>`;

    bwlLoot.forEach(item => {
      const option = document.createElement("option");
      option.value = item.name;
      option.textContent = item.name;
      select.appendChild(option);
    });
  });
}

function renderLootList(){
  const list = document.getElementById("lootList");
  list.innerHTML = "";

  bwlLoot.forEach(item => {
    const div = document.createElement("div");
    div.className = `loot-item ${item.quality}`;
    div.textContent = item.name;

    div.addEventListener("mouseenter", event => showTooltip(event, item));
    div.addEventListener("mousemove", event => moveTooltip(event));
    div.addEventListener("mouseleave", hideTooltip);

    list.appendChild(div);
  });
}

function savePrio(){
  const pin = document.getElementById("raidPin").value.trim();
  const player = document.getElementById("playerName").value.trim();
  const playerClass = document.getElementById("playerClass").value;
  const p1 = document.getElementById("p1").value;
  const p2 = document.getElementById("p2").value;
  const p3 = document.getElementById("p3").value;
  const status = document.getElementById("playerStatus");

  if(pin !== RAID_PIN){
    status.innerHTML = `<span class="bad">Falscher Raid-PIN.</span>`;
    return;
  }

  if(!player || !playerClass || !p1 || !p2 || !p3){
    status.innerHTML = `<span class="bad">Bitte alles vollständig ausfüllen.</span>`;
    return;
  }

  status.innerHTML = `<span class="ok">✓ Deine Prios wurden gespeichert.</span>`;
}

function showTooltip(event, item){
  const tooltip = document.getElementById("tooltip");

  const statsHtml = item.stats.map(stat => `<div class="tooltip-stat">${stat}</div>`).join("");

  const p0Html = item.p0.length
    ? item.p0.map(player => `<li>${player}</li>`).join("")
    : `<li>Keine P0+ gesetzt</li>`;

  tooltip.innerHTML = `
    <div class="tooltip-title ${item.quality}">${item.name}</div>
    <div class="tooltip-ilvl">${item.ilvl}</div>
    <div class="tooltip-bind">${item.bind}</div>

    <div class="tooltip-row">
      <span>${item.slot}</span>
      <span>${item.type || ""}</span>
    </div>

    ${item.damage ? `
      <div class="tooltip-row">
        <span>${item.damage}</span>
        <span>${item.speed || ""}</span>
      </div>
    ` : ""}

    ${item.dps ? `<div class="tooltip-stat">${item.dps}</div>` : ""}

    ${statsHtml}

    ${item.equip ? `<div class="tooltip-equip">${item.equip}</div>` : ""}

    <div class="tooltip-p0">
      <strong>Gesetzte P0+</strong>
      <ul>${p0Html}</ul>
    </div>
  `;

  moveTooltip(event);
  tooltip.classList.remove("hidden");
}

function moveTooltip(event){
  const tooltip = document.getElementById("tooltip");
  tooltip.style.left = (event.clientX + 20) + "px";
  tooltip.style.top = (event.clientY + 20) + "px";
}

function hideTooltip(){
  document.getElementById("tooltip").classList.add("hidden");
}

fillItems();
renderLootList();

</script>
