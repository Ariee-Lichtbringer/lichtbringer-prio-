<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lichtbringer – BWL Prio-Auswahl</title>

  <style>

    :root{
      --gold:#facc15;
      --blue:#60a5fa;
      --bg:#08111f;
      --panel:rgba(12,18,32,.88);
      --text:#f8fafc;
      --muted:#cbd5e1;
      --line:rgba(255,255,255,.12);
      --danger:#ef4444;
      --green:#22c55e;
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
    }

    body{
      min-height:100vh;
      font-family:Arial, Helvetica, sans-serif;
      color:var(--text);

      background:
        linear-gradient(rgba(8,17,31,.80), rgba(8,17,31,.94)),
        url('../images/bwl.jpg');

      background-size:cover;
      background-position:center;
      background-attachment:fixed;
    }

    .overlay{
      min-height:100vh;
      padding:36px 22px 60px;
      backdrop-filter:blur(3px);
    }

    .topbar{
      width:min(1200px,100%);
      margin:0 auto 28px;

      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:16px;
      flex-wrap:wrap;
    }

    .back{
      color:var(--text);
      text-decoration:none;
      font-weight:800;

      border:1px solid var(--line);

      padding:12px 16px;

      border-radius:14px;

      background:rgba(12,18,32,.72);
    }

    .back:hover{
      border-color:rgba(250,204,21,.45);
    }

    .header{
      width:min(1200px,100%);
      margin:0 auto 28px;

      padding:30px;

      border-radius:24px;

      background:var(--panel);

      border:1px solid rgba(250,204,21,.22);

      box-shadow:0 20px 45px rgba(0,0,0,.45);
    }

    h1{
      color:var(--gold);
      font-size:clamp(34px,5vw,58px);
      margin-bottom:8px;
    }

    .subtitle{
      color:#dbeafe;
      line-height:1.7;
      font-size:15px;
    }

    .grid{
      width:min(1200px,100%);
      margin:auto;

      display:grid;
      grid-template-columns:1.1fr .9fr;
      gap:22px;
    }

    .card{
      background:var(--panel);

      border:1px solid var(--line);

      border-radius:22px;

      padding:24px;

      box-shadow:0 18px 40px rgba(0,0,0,.38);
    }

    h2{
      color:var(--gold);
      margin-bottom:16px;
      font-size:24px;
    }

    label{
      display:block;

      color:var(--muted);

      font-size:13px;
      font-weight:800;

      margin:14px 0 7px;

      text-transform:uppercase;
      letter-spacing:.08em;
    }

    input,
    select{
      width:100%;

      padding:13px 14px;

      border-radius:12px;

      border:1px solid rgba(255,255,255,.16);

      background:rgba(2,6,23,.82);

      color:var(--text);

      font-size:15px;
    }

    .btn{
      width:100%;

      margin-top:16px;

      padding:14px 18px;

      border-radius:14px;

      border:1px solid rgba(250,204,21,.25);

      background:
        linear-gradient(
          135deg,
          rgba(250,204,21,.28),
          rgba(96,165,250,.18)
        );

      color:var(--text);

      font-weight:900;

      cursor:pointer;

      transition:.18s;
    }

    .btn:hover{
      transform:translateY(-2px);
      border-color:rgba(250,204,21,.55);
    }

    .status{
      margin-top:16px;

      padding:14px;

      border-radius:14px;

      border:1px solid var(--line);

      background:rgba(2,6,23,.55);

      color:#dbeafe;

      line-height:1.6;
      font-size:14px;
    }

    .ok{
      color:var(--green);
      font-weight:900;
    }

    .bad{
      color:var(--danger);
      font-weight:900;
    }

    .hidden{
      display:none;
    }

    table{
      width:100%;
      border-collapse:collapse;
      margin-top:12px;
      font-size:14px;
    }

    th,
    td{
      padding:10px;
      border-bottom:1px solid rgba(255,255,255,.10);
      text-align:left;
    }

    th{
      color:var(--gold);
      font-size:12px;
      text-transform:uppercase;
    }

    .item-preview{
      display:none;

      margin-top:10px;

      padding:14px;

      border-radius:14px;

      background:rgba(2,6,23,.88);

      border:1px solid rgba(250,204,21,.35);

      box-shadow:0 0 22px rgba(250,204,21,.18);

      color:#dbeafe;

      line-height:1.6;
      font-size:14px;
    }

    .item-preview strong{
      color:#facc15;
    }

    .item-preview ul{
      margin-top:8px;
      padding-left:18px;
    }

    @media(max-width:900px){

      .grid{
        grid-template-columns:1fr;
      }

    }

  </style>
</head>

<body>

<div class="overlay">

  <div class="topbar">

    <a class="back" href="../index.html">
      ← Zurück zur Startseite
    </a>

    <a class="back" href="../bwl.html">
      P0+ Übersicht öffnen
    </a>

  </div>

  <div class="header">

    <h1>Blackwing Lair – Prio-Auswahl</h1>

    <div class="subtitle">
      Spieler können ihre P1-, P2- und P3-Prioritäten eintragen.
      Die Liste bleibt bis zur Freigabe verborgen.
    </div>

  </div>

  <div class="grid">

    <!-- SPIELER -->

    <div class="card">

      <h2>Spieler-Eingabe</h2>

      <label>Raid-PIN</label>
      <input id="raidPin" type="password" placeholder="Raid-PIN eingeben">

      <label>Charaktername</label>
      <input id="playerName" type="text" placeholder="z. B. Milkshake">

      <label>Klasse</label>

      <select id="playerClass">
        <option value="">Klasse auswählen</option>
        <option>Krieger</option>
        <option>Paladin</option>
        <option>Jäger</option>
        <option>Schurke</option>
        <option>Priester</option>
        <option>Schamane</option>
        <option>Magier</option>
        <option>Hexenmeister</option>
        <option>Druide</option>
      </select>

      <!-- P1 -->

      <label>P1</label>

      <select
        id="p1"
        onmouseenter="showItemInfo('p1','p1Info')"
        onmouseleave="hideItemInfo('p1Info')"
        onchange="showItemInfo('p1','p1Info')"
      ></select>

      <div id="p1Info" class="item-preview"></div>

      <!-- P2 -->

      <label>P2</label>

      <select
        id="p2"
        onmouseenter="showItemInfo('p2','p2Info')"
        onmouseleave="hideItemInfo('p2Info')"
        onchange="showItemInfo('p2','p2Info')"
      ></select>

      <div id="p2Info" class="item-preview"></div>

      <!-- P3 -->

      <label>P3</label>

      <select
        id="p3"
        onmouseenter="showItemInfo('p3','p3Info')"
        onmouseleave="hideItemInfo('p3Info')"
        onchange="showItemInfo('p3','p3Info')"
      ></select>

      <div id="p3Info" class="item-preview"></div>

      <button class="btn" onclick="savePrio()">
        Prios speichern
      </button>

      <div id="playerStatus" class="status">
        Status: Bitte Raid-PIN eingeben und Prios auswählen.
      </div>

    </div>

    <!-- RAIDLEAD -->

    <div class="card">

      <h2>Raidlead-Bereich</h2>

      <label>Raidlead-PIN</label>
      <input id="leadPin" type="password" placeholder="Raidlead-PIN">

      <button class="btn" onclick="openLeadPanel()">
        Raidlead-Panel öffnen
      </button>

      <div id="leadPanel" class="hidden">

        <table>

          <thead>

            <tr>
              <th>Spieler</th>
              <th>Klasse</th>
              <th>P1</th>
              <th>P2</th>
              <th>P3</th>
            </tr>

          </thead>

          <tbody id="leadTable"></tbody>

        </table>

      </div>

    </div>

  </div>

</div>

<script>

const RAID_PIN = "bwl";
const LEAD_PIN = "lead";

const bwlItems = [

  "Neltharions Träne",
  "Klaue von Chromaggus",
  "Ashkandi, Großschwert der Bruderschaft",
  "Drake Fang Talisman",
  "Maladath, Runenverzierte Klinge des schwarzen Drachenschwarms",
  "Mish'undare, Reif des Gedankenschinders",
  "Lok'amir il Romathis",
  "Band des Peinigers",
  "Blutreißer"

];

const p0PlusData = {

  "Neltharions Träne": [
    { player:"Milkshake", points:6 },
    { player:"Ariee", points:4 },
    { player:"Burny", points:2 }
  ],

  "Drake Fang Talisman": [
    { player:"Mala", points:8 },
    { player:"Setsunai", points:5 },
    { player:"Protekta", points:3 }
  ],

  "Ashkandi, Großschwert der Bruderschaft": [
    { player:"Bimmi", points:7 },
    { player:"Enno", points:4 }
  ]

};

function fillItems(){

  ["p1","p2","p3"].forEach(id => {

    const select = document.getElementById(id);

    select.innerHTML = `<option value="">Item auswählen</option>`;

    bwlItems.forEach(item => {

      const option = document.createElement("option");

      option.value = item;
      option.textContent = item;

      select.appendChild(option);

    });

  });

}

function showItemInfo(selectId, infoId){

  const item = document.getElementById(selectId).value;

  const box = document.getElementById(infoId);

  if(!item){

    box.style.display = "block";

    box.innerHTML = "Bitte zuerst ein Item auswählen.";

    return;

  }

  const entries = p0PlusData[item] || [];

  if(entries.length === 0){

    box.style.display = "block";

    box.innerHTML = `
      <strong>${item}</strong><br>
      Keine P0+-Einträge vorhanden.
    `;

    return;

  }

  let html = `<strong>${item}</strong><br>P0+ Übersicht:<ul>`;

  entries.forEach(entry => {

    html += `
      <li>${entry.player} – ${entry.points} Punkte</li>
    `;

  });

  html += `</ul>`;

  box.style.display = "block";

  box.innerHTML = html;

}

function hideItemInfo(infoId){

  document.getElementById(infoId).style.display = "none";

}

function getData(){

  return JSON.parse(localStorage.getItem("bwl_prios") || "[]");

}

function setData(data){

  localStorage.setItem("bwl_prios", JSON.stringify(data));

}

function savePrio(){

  const pin = document.getElementById("raidPin").value.trim();

  const player = document.getElementById("playerName").value.trim();

  const playerClass = document.getElementById("playerClass").value;

  const p1 = document.getElementById("p1").value;
  const p2 = document.getElementById("p2").value;
  const p3 = document.getElementById("p3").value;

  const status = document.getElementById("playerStatus");

  if(pin !== RAID_PIN){

    status.innerHTML = `
      <span class="bad">Falscher Raid-PIN.</span>
    `;

    return;

  }

  if(!player || !playerClass || !p1 || !p2 || !p3){

    status.innerHTML = `
      <span class="bad">
        Bitte alles vollständig ausfüllen.
      </span>
    `;

    return;

  }

  let data = getData();

  data = data.filter(
    entry => entry.player.toLowerCase() !== player.toLowerCase()
  );

  data.push({
    player,
    class:playerClass,
    p1,
    p2,
    p3
  });

  setData(data);

  status.innerHTML = `
    <span class="ok">
      ✓ Deine Prios wurden gespeichert.
    </span>
  `;

}

function openLeadPanel(){

  const pin = document.getElementById("leadPin").value.trim();

  if(pin !== LEAD_PIN){

    alert("Falscher Raidlead-PIN.");

    return;

  }

  document.getElementById("leadPanel").classList.remove("hidden");

  renderLeadTable();

}

function renderLeadTable(){

  const data = getData();

  const tbody = document.getElementById("leadTable");

  tbody.innerHTML = "";

  data.forEach(entry => {

    tbody.innerHTML += `
      <tr>
        <td>${entry.player}</td>
        <td>${entry.class}</td>
        <td>${entry.p1}</td>
        <td>${entry.p2}</td>
        <td>${entry.p3}</td>
      </tr>
    `;

  });

}

fillItems();

</script>

</body>
</html>
