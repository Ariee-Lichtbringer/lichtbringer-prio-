<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lichtbringer – Raidlead Panel</title>

  <style>
    :root{
      --gold:#facc15;
      --blue:#60a5fa;
      --panel:rgba(12,18,32,.90);
      --text:#f8fafc;
      --muted:#cbd5e1;
      --line:rgba(255,255,255,.12);
      --danger:#ef4444;
      --green:#22c55e;
    }

    *{box-sizing:border-box;margin:0;padding:0}

    body{
      min-height:100vh;
      font-family:Arial, Helvetica, sans-serif;
      color:var(--text);
      background:
        linear-gradient(rgba(8,17,31,.82), rgba(8,17,31,.94)),
        url('./images/back.jpeg');
      background-size:cover;
      background-position:center top;
      background-attachment:fixed;
    }

    .overlay{
      min-height:100vh;
      padding:36px 22px 70px;
      backdrop-filter:blur(3px);
    }

    .topbar{
      width:min(1300px,100%);
      margin:0 auto 28px;
      display:flex;
      justify-content:space-between;
      gap:14px;
      align-items:center;
      flex-wrap:wrap;
    }

    .btn-link,
    .btn{
      color:var(--text);
      text-decoration:none;
      font-weight:900;
      border:1px solid var(--line);
      padding:12px 16px;
      border-radius:14px;
      background:rgba(12,18,32,.72);
      cursor:pointer;
      display:inline-block;
      text-align:center;
      transition:.18s;
    }

    .btn-link:hover,
    .btn:hover{
      border-color:rgba(250,204,21,.55);
      transform:translateY(-1px);
    }

    .header{
      width:min(1300px,100%);
      margin:0 auto 28px;
      padding:30px;
      border-radius:24px;
      background:var(--panel);
      border:1px solid rgba(250,204,21,.22);
      box-shadow:0 20px 45px rgba(0,0,0,.45);
    }

    h1{
      color:var(--gold);
      font-size:clamp(34px,5vw,58px);
      margin-bottom:8px;
    }

    .subtitle{
      color:#dbeafe;
      line-height:1.7;
      font-size:15px;
    }

    .grid{
      width:min(1300px,100%);
      margin:auto;
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:22px;
    }

    .card{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:22px;
      padding:24px;
      box-shadow:0 18px 40px rgba(0,0,0,.38);
    }

    h2{
      color:var(--gold);
      margin-bottom:10px;
      font-size:25px;
    }

    h3{
      color:#dbeafe;
      font-size:14px;
      text-transform:uppercase;
      letter-spacing:.12em;
      margin-top:20px;
      margin-bottom:10px;
    }

    .status,
    .new-raid-box{
      margin:14px 0;
      padding:14px;
      border-radius:16px;
      border:1px solid var(--line);
      background:rgba(2,6,23,.55);
      color:#dbeafe;
      line-height:1.6;
      font-size:14px;
    }

    .new-raid-box{
      border-color:rgba(250,204,21,.32);
      box-shadow:0 0 0 1px rgba(250,204,21,.08);
    }

    .new-raid-box strong{
      color:var(--gold);
    }

    .new-raid-box a{
      color:#93c5fd;
      font-weight:900;
      word-break:break-all;
    }

    .ok{color:var(--green);font-weight:900}
    .warn{color:var(--gold);font-weight:900}
    .bad{color:var(--danger);font-weight:900}

    .button-grid{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:10px;
      margin-top:10px;
    }

    .btn.primary{
      background:linear-gradient(135deg,rgba(250,204,21,.32),rgba(96,165,250,.18));
      border-color:rgba(250,204,21,.35);
    }

    .btn.neutral{
      background:linear-gradient(135deg,rgba(96,165,250,.22),rgba(15,23,42,.65));
      border-color:rgba(96,165,250,.25);
    }

    .btn.success{
      background:linear-gradient(135deg,rgba(34,197,94,.28),rgba(15,23,42,.65));
      border-color:rgba(34,197,94,.35);
    }

    .btn.warning{
      background:linear-gradient(135deg,rgba(250,204,21,.24),rgba(15,23,42,.65));
      border-color:rgba(250,204,21,.35);
    }

    .btn.danger{
      background:linear-gradient(135deg,rgba(239,68,68,.35),rgba(15,23,42,.65));
      border-color:rgba(239,68,68,.40);
    }

    table{
      width:100%;
      border-collapse:collapse;
      margin-top:14px;
      font-size:14px;
    }

    th,td{
      padding:9px;
      border-bottom:1px solid rgba(255,255,255,.10);
      text-align:left;
    }

    th{
      color:var(--gold);
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:.08em;
    }

    @media(max-width:900px){
      .grid{grid-template-columns:1fr}
      .button-grid{grid-template-columns:1fr}
    }
  </style>
</head>

<body>

<div class="overlay">

  <div class="topbar">
    <a class="btn-link" href="index.html">← Zurück zur Startseite</a>
    <button class="btn danger" onclick="logout()">Logout</button>
  </div>

  <div class="header">
    <h1>Raidlead Panel</h1>
    <div class="subtitle">
      Zentrale Verwaltung der Priolisten. Neue Raids erzeugen eigene RaidIDs, Spieler-PINs und Lead-PINs. Bestehende Raids werden dabei nicht gelöscht.
    </div>
    <div id="roleInfo" class="status"></div>
  </div>

  <div id="raidGrid" class="grid"></div>

</div>
